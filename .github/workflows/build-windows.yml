name: Build Windows Installer

# Triggers:
#   - Push to the dev branch     → builds + uploads artifact
#   - Push a tag like v1.0.0     → builds + creates a GitHub Release
#   - Manual trigger             → builds + uploads artifact
on:
  push:
    branches:
      - 'claude/magical-fermat-6iUmi'
      - 'main'
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create GitHub Release after build'
        type: boolean
        default: false

# Force all JS actions to use Node.js 24 (replaces deprecated Node 20)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 150    # R package install can take 60-90 min

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      # ── 2. Node.js ──────────────────────────────────────────────────────────
      - name: Setup Node.js 22
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'
          # No 'cache: npm' here — repo has no package-lock.json yet.
          # node_modules is cached manually in the next step.

      # Cache node_modules keyed to package.json (no lock file needed)
      - name: Cache node_modules
        id: cache-node
        uses: actions/cache@v4.2.3
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package.json') }}

      # ── 3. R 4.4 ────────────────────────────────────────────────────────────
      - name: Setup R 4.4
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4'        # pin to 4.4 — R 4.5+ removed C APIs used by old Bioc packages
          use-public-rspm: true

      # ── 4. Cache R packages ─────────────────────────────────────────────────
      #    Key includes OS + R version + hash of install script.
      #    On cache hit the install step is skipped entirely (~60 min saved).
      - name: Cache R packages
        id: cache-r
        uses: actions/cache@v4.2.3
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-libs-${{ runner.os }}-4.4-${{ hashFiles('scripts/install_packages.R') }}
          restore-keys: |
            r-libs-${{ runner.os }}-4.4-

      # ── 5. Install R packages ───────────────────────────────────────────────
      #    Skipped when cache hit.  Uses Posit binary repo for Bioc packages.
      #    Uses pak (already bundled with r-lib/actions) for GitHub installs —
      #    devtools::install_github() is deprecated since devtools 2.5.0.
      - name: Install R packages
        if: steps.cache-r.outputs.cache-hit != 'true'
        shell: Rscript {0}
        run: |
          # Use Bioconductor 3.19 which matches R 4.4
          options(Ncpus = parallel::detectCores())

          # ── pak ───────────────────────────────────────────────────────────────
          if (!requireNamespace("pak", quietly = TRUE))
            install.packages("pak",
              repos = "https://packagemanager.posit.co/cran/latest")

          # ── Bioconductor 3.19 core (binary builds for R 4.4) ─────────────────
          # DillonHammill/openCyto is an OLD fork (v2.13) that fails to compile
          # on R 4.4+ due to removed C API (ENVFLAGS/SET_ENVFLAGS). Use the
          # official Bioconductor 3.19 openCyto v2.24 instead.
          pak::pak(c(
            "bioc::cytolib",
            "bioc::flowCore",
            "bioc::flowWorkspace",
            "bioc::flowWorkspaceData",
            "bioc::openCyto",
            "bioc::FlowSOM"
          ), ask = FALSE)

          # ── superheat (removed from CRAN, required by CytoExploreR) ──────────
          pak::pak("rlbarter/superheat", ask = FALSE)

          # ── CytoExploreR suite from GitHub ────────────────────────────────────
          # openCyto omitted here — Bioc v2.24 already installed above is used.
          pak::pak(c(
            "DillonHammill/DataEditR",
            "DillonHammill/HeatmapR",
            "DillonHammill/CytoExploreRData",
            "DillonHammill/CytoExploreR"
          ), ask = FALSE)

          # ── CRAN packages ─────────────────────────────────────────────────────
          pak::pak(c(
            "shiny", "shinydashboard", "shinyFiles", "shinyjs",
            "shinycssloaders", "DT", "plotly", "ggplot2", "dplyr",
            "tidyr", "colourpicker", "rhandsontable", "openxlsx",
            "umap", "Rtsne", "MASS", "fields", "zip", "jsonlite"
          ), ask = FALSE)

          message("All packages installed. Library: ", .libPaths()[1])

      # ── 6. Wire up R-Portable ────────────────────────────────────────────────
      #    electron-builder expects R-Portable/ at the repo root.
      #    Physical robocopy is used — mklink /J can fail silently when the
      #    source and destination are on different drives (C:\ vs workspace).
      - name: Create R-Portable structure
        shell: pwsh
        run: |
          # Find R home installed by r-lib/actions
          $rScript = (Get-Command Rscript.exe).Source
          Write-Host "Rscript path: $rScript"

          # r-lib/actions on windows-latest puts R at C:\R\bin\Rscript.exe
          # or C:\R\bin\x64\Rscript.exe — handle both layouts
          $rBin  = Split-Path $rScript
          if ($rBin -match '\\x64$') {
            $rHome = Split-Path (Split-Path $rBin)
          } else {
            $rHome = Split-Path $rBin
          }
          Write-Host "R home: $rHome"

          $dest = "$env:GITHUB_WORKSPACE\R-Portable"
          New-Item -ItemType Directory -Path $dest -Force | Out-Null

          # Physical copy — reliable across drives, no junction fragility
          # robocopy exit 0=no files, 1=files copied OK, >=8=error
          Write-Host "Copying R installation to R-Portable (this may take a minute)..."
          robocopy "$rHome" "$dest" /E /NFL /NDL /NJH /NJS /NC /NS /NP | Out-Null
          if ($LASTEXITCODE -ge 8) { Write-Error "robocopy failed: $LASTEXITCODE"; exit 1 }
          $LASTEXITCODE = 0

          # Copy user-installed packages into R-Portable\library
          $userLibRaw = & Rscript.exe --vanilla -e "cat(.libPaths()[1])"
          $userLib    = $userLibRaw.Trim()
          $sysLib     = "$dest\library"
          Write-Host "User lib:   $userLib"
          Write-Host "System lib: $sysLib"

          if ((Test-Path $userLib) -and ($userLib -ne $sysLib)) {
            Write-Host "Merging user packages into R-Portable\library..."
            robocopy "$userLib" "$sysLib" /E /XO /NFL /NDL /NJH /NJS /NC /NS /NP | Out-Null
            if ($LASTEXITCODE -ge 8) { Write-Error "robocopy merge failed: $LASTEXITCODE"; exit 1 }
            $LASTEXITCODE = 0
            Write-Host "Package merge complete."
          } else {
            Write-Host "Skipping merge (same path or missing)."
          }

          # Verify — accept either flat or x64 layout
          $rscriptOk = (Test-Path "$dest\bin\Rscript.exe") -or
                       (Test-Path "$dest\bin\x64\Rscript.exe")
          if (-not $rscriptOk) {
            Write-Error "R-Portable copy failed — Rscript.exe not found under $dest\bin"
            Get-ChildItem "$dest\bin" -Recurse -ErrorAction SilentlyContinue |
              Select-Object -First 20 FullName
            exit 1
          }
          Write-Host "R-Portable verification passed."

          $sizeMB = [math]::Round(
            (Get-ChildItem $dest -Recurse -File |
             Measure-Object -Property Length -Sum).Sum / 1MB, 0)
          Write-Host "R-Portable total size: ${sizeMB} MB"

      # ── 7. npm install ───────────────────────────────────────────────────────
      - name: Install npm dependencies
        if: steps.cache-node.outputs.cache-hit != 'true'
        run: npm install

      # ── 8. Build electron app ────────────────────────────────────────────────
      - name: Build StreamFLOW installer
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── 9. Show output ───────────────────────────────────────────────────────
      - name: List build output
        shell: pwsh
        run: |
          if (Test-Path "dist") {
            Get-ChildItem dist -File | Select-Object Name,
              @{N='Size (MB)';E={[math]::Round($_.Length/1MB,1)}}
          } else {
            Write-Error "dist/ folder not found — build may have failed"
            exit 1
          }

      # ── 10. Upload as workflow artifact ─────────────────────────────────────
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: StreamFLOW-Windows-Installer
          path: dist/*.exe
          retention-days: 30
          if-no-files-found: error

      # ── 11. Create GitHub Release (on tag push or manual opt-in) ────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.create_release == 'true'
        uses: softprops/action-gh-release@v2.3.2
        with:
          tag_name: ${{ github.ref_name }}
          name: StreamFLOW ${{ github.ref_name }}
          body: |
            ## StreamFLOW ${{ github.ref_name }}

            ### Installation
            1. Download `StreamFLOW-Setup-*.exe` below
            2. Run the installer (no R or Node.js required — everything is bundled)
            3. Launch StreamFLOW from the desktop shortcut

            ### What's included
            - Electron desktop shell
            - R 4.4.3 (portable, bundled)
            - CytoExploreR + all flow cytometry packages

            ### System requirements
            - Windows 10/11 (64-bit)
            - ~1 GB disk space
          files: dist/*.exe
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
